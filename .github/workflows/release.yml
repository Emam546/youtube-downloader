name: Release
on:
  release:
    types:
      - created
  workflow_dispatch:
permissions:
  contents: write # Required for creating releases
  id-token: write # Required for authenticating with GitHub Packages
env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
jobs:
  
  publish_on_win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v3
        with:
          node-version: 20.0.0
      - name: install dependencies
        run: npm install
      - name: Build scripts
        run: npm run build:scripts
      - name: Create scripts zip
        shell: pwsh
        run: |
          Compress-Archive -Path ./out/scripts/* -DestinationPath ./scripts.zip
      - name: packing
        run: npm run pack
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts.zip
            dist/youtube-downloader-setup-${{ github.event.release.tag_name }}-win.exe
